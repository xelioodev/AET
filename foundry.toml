[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.35"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
base = "${BASE_MAINNET_RPC_URL}"

[etherscan]
base = { key = "${ETHERSCAN_API_KEY}", chain = 8453, url = "${ETHERSCAN_API_URL}" }
